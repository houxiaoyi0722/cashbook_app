name: Build Android

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Create release keystore
        working-directory: android/app
        run: |
          # Create a dummy release keystore for CI builds
          keytool -genkeypair -v -storetype PKCS12 -keystore my-release-key.keystore \
            -alias my-key-alias -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass cashbook -keypass cashbook \
            -dname "CN=CI Build, OU=CI, O=CI, L=City, ST=State, C=US"

      - name: Build Android Release APK (bundled JS)
        working-directory: android
        run: ./gradlew assembleRelease

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apk
          path: android/app/build/outputs/apk/release/*.apk
