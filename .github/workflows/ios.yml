name: Build iOS

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-ios:
    name: Build iOS IPA
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.12.0'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Clean DerivedData and build
        run: |
          rm -rf ~/Library/Developer/Xcode/DerivedData/cashbook_app-*
          rm -rf ios/build

      - name: Install iOS dependencies
        working-directory: ios
        run: |
          rm -rf Pods Podfile.lock build
          pod deintegrate || true
          pod install --repo-update

      - name: Build iOS
        working-directory: ios
        run: |
          xcodebuild -project cashbook_app.xcodeproj \
            -scheme cashbook_app \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -skipUnavailableActions \
            -UseModernBuildSystem=YES \
            CLANG_ENABLE_MODULES=NO \
            SWIFT_VERSION=5.0 \
            clean build 2>&1 | tee build.log || true
          
      - name: Check build result
        run: |
          if grep -q "BUILD SUCCEEDED" ios/build.log; then
            echo "Build succeeded"
          else
            echo "Build failed - checking for errors"
            grep -E "(error:|BUILD FAILED)" ios/build.log || true
            exit 1
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: false  # IPA won't be generated for simulator build
        with:
          name: ios-build
          path: ios/build
