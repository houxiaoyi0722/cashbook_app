name: Build iOS

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-ios:
    name: Build iOS IPA
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Ensure PrivacyInfo.xcprivacy exists
        run: |
          # Create both folder names to handle the mismatch
          mkdir -p ios/cashbook_app
          
          # Copy PrivacyInfo.xcprivacy to both locations
          if [ -f "ios/cashbook_app/PrivacyInfo.xcprivacy" ]; then
            cp ios/cashbook_app/PrivacyInfo.xcprivacy ios/cashbook_app/PrivacyInfo.xcprivacy
          else
            echo '<?xml version="1.0" encoding="UTF-8"?><!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd"><plist version="1.0"><dict/></plist>' > ios/cashbook_app/PrivacyInfo.xcprivacy
          fi

      - name: Install iOS dependencies
        working-directory: ios
        run: pod install

      - name: Build iOS
        working-directory: ios
        run: |
          xcodebuild -project cashbook_app.xcodeproj \
            -scheme cashbook_app \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: false  # IPA won't be generated for simulator build
        with:
          name: ios-build
          path: ios/build
