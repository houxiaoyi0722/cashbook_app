name: Build iOS

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-ios:
    name: Build iOS IPA
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Install iOS dependencies
        working-directory: ios
        run: pod install

      - name: Create RCT-Folly privacy bundle
        run: |
          mkdir -p ios/Pods/RCT-Folly/RCT-Folly_privacy.bundle
          cat > ios/Pods/RCT-Folly/RCT-Folly_privacy.bundle/Info.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleDevelopmentRegion</key><string>en</string>
            <key>CFBundleExecutable</key><string>$(EXECUTABLE_NAME)</string>
            <key>CFBundleIdentifier</key><string>$(PRODUCT_BUNDLE_IDENTIFIER)</string>
            <key>CFBundleInfoDictionaryVersion</key><string>6.0</string>
            <key>CFBundleName</key><string>$(PRODUCT_NAME)</string>
            <key>CFBundlePackageType</key><string>BNDL</string>
            <key>CFBundleShortVersionString</key><string>1.0</string>
            <key>CFBundleVersion</key><string>1</string>
          </dict>
          </plist>
          PLIST

      - name: Build iOS
        working-directory: ios
        run: |
          xcodebuild -project cashbook_app.xcodeproj \
            -scheme cashbook_app \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build/derived \
            build

      - name: Copy bundle to build directory
        run: |
          mkdir -p ios/build/derived/Build/Products/Debug-iphonesimulator/RCT-Folly/
          cp -r ios/Pods/RCT-Folly/RCT-Folly_privacy.bundle \
            ios/build/derived/Build/Products/Debug-iphonesimulator/RCT-Folly/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: ios/build
