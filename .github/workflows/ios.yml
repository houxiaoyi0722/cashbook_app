name: Build iOS

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-ios:
    name: Build iOS IPA
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.12.0'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Clean iOS build artifacts
        run: |
          rm -rf ios/Pods ios/Podfile.lock ios/build ios/cashbook_app.xcworkspace
          rm -rf ~/Library/Developer/Xcode/DerivedData/cashbook_app-*

      - name: Install iOS dependencies
        working-directory: ios
        run: pod install --repo-update

      - name: Build iOS
        working-directory: ios
        run: |
          xcodebuild -workspace cashbook_app.xcworkspace \
            -scheme cashbook_app \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            -skipUnavailableActions \
            clean build \
            CONFIGURATION_BUILD_DIR="$PWD/build"

      - name: Create .deb package
        run: |
          cd ios/build
          
          # 创建 deb 目录结构
          mkdir -p deb/DEBIAN
          mkdir -p deb/Applications/cashbook_app.app
          
          # 复制 app 文件
          cp -r cashbook_app.app/* deb/Applications/cashbook_app.app/
          
          # 创建 control 文件
          cat > deb/DEBIAN/control << 'EOF'
          Package: com.cashbook.app
          Name: CashBook
          Version: 1.0.0
          Architecture: iphoneos-arm
          Description: A personal expense tracking app
          Author: CashBook Team
          Section: Applications
          Maintainer: CashBook Team
          EOF
          
          # 设置权限
          chmod 755 deb/Applications/cashbook_app.app/cashbook_app
          chmod 755 deb/DEBIAN
          
          # 打包 deb
          dpkg-deb -b deb cashbook-app.deb
          
          # 清理临时目录
          rm -rf deb

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cashbook-app-artifacts
          path: |
            ios/build/cashbook_app.app
            ios/build/cashbook-app.deb
          retention-days: 7
